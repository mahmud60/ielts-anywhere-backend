name: Deploy IELTS Pro

on:
  push:
    branches:
      - main
    paths:
      - '**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  REGISTRY: asia-southeast1-docker.pkg.dev

jobs:

  # ── 1. Build and push FastAPI image ────────────────────────────────────────
  build-api:
    name: Build FastAPI image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Generate image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build and push FastAPI image
        run: |
          docker build \
            -f ielts-anywhere-backend/Dockerfile.api \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/ielts-images/fastapi:${{ steps.tag.outputs.tag }} \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/ielts-images/fastapi:latest \
            .

          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/ielts-images/fastapi:${{ steps.tag.outputs.tag }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/ielts-images/fastapi:latest

  # ── 2. Run database migrations ─────────────────────────────────────────────
  migrate:
    name: Run Alembic migrations
    runs-on: ubuntu-latest
    needs: build-api
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Run migrations via Cloud Run Job
        run: |
          gcloud run jobs deploy run-migrations \
            --image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/ielts-images/fastapi:${{ needs.build-api.outputs.image_tag }} \
            --region=${{ env.REGION }} \
            --command="alembic" \
            --args="upgrade,head" \
            --set-env-vars="DATABASE_URL=${{ secrets.DATABASE_URL }}" \
            --quiet

          gcloud run jobs execute run-migrations \
            --region=${{ env.REGION }} \
            --wait

  # ── 3. Deploy FastAPI to Cloud Run ─────────────────────────────────────────
  deploy-api:
    name: Deploy FastAPI to Cloud Run
    runs-on: ubuntu-latest
    needs: migrate
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy fastapi \
            --image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/ielts-images/fastapi:${{ needs.build-api.outputs.image_tag }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=10 \
            --memory=512Mi \
            --cpu=1 \
            --concurrency=80 \
            --timeout=60 \
            --set-env-vars=DATABASE_URL=${{ secrets.DATABASE_URL }},ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }},REDIS_URL=${{ secrets.REDIS_URL }},R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }},R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }},R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }},R2_BUCKET_NAME=${{ secrets.R2_BUCKET_NAME }},R2_PUBLIC_URL=${{ secrets.R2_PUBLIC_URL }},FIREBASE_SERVICE_ACCOUNT_B64=${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }},ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }},LISTENING_TIME_LIMIT=1800,READING_TIME_LIMIT=3600,WRITING_TIME_LIMIT=3600,SPEAKING_TIME_LIMIT=900,DEBUG=False \
            --quiet

  # ── 4. Deploy Celery to VM via SSH ──────────────────────────────────────────
  deploy-celery:
    name: Deploy Celery to VM
    runs-on: ubuntu-latest
    needs: migrate

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd ~/ielts-pro
            git pull origin main
            cd ielts-anywhere-backend
            source venv/bin/activate
            pip install -r requirements.txt --quiet
            sudo systemctl restart celery
            sleep 3
            sudo systemctl is-active celery
            echo "Celery deployed successfully"
